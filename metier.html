<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fiche métier</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="page">
    <div class="container" id="app">Chargement…</div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug");

    fetch("data/metiers.json")
      .then(r => r.json())
      .then(data => {
        const metier = data.find(m => m.SLUG === slug) || data[0];

        function clamp(n, min, max) {
          return Math.max(min, Math.min(max, Number(n)));
        }

        function gauge(value, left, right, reverse = false) {
          let pos = clamp(value, 0, 10) * 10;
          if (reverse) pos = 100 - pos;

          return `
            <div class="gauge-card">
              <div class="gauge-top">
                <span>${left}</span>
                <span>${right}</span>
              </div>
              <div class="gauge-line">
                <div class="gauge-line-bg"></div>
                <div class="gauge-cursor" style="left: calc(${pos}% - 10px);"></div>
              </div>
            </div>
          `;
        }

        function youtubeEmbed(url) {
          if (!url) return "";
          try {
            const u = new URL(url);
            let id = u.searchParams.get("v");
            if (!id && u.hostname.includes("youtu.be")) {
              id = u.pathname.replace("/", "");
            }
            if (!id) return "";
            return `<iframe src="https://www.youtube.com/embed/${id}" title="Vidéo YouTube" loading="lazy" allowfullscreen></iframe>`;
          } catch {
            return "";
          }
        }

       function euros(n) {
  const value = Number(n) || 0;
  const full = Math.floor(value);
  const half = value % 1 >= 0.5;

  let result = "€".repeat(full);

  if (half) {
    result += "<span class='euro-half'>€</span>";
  }

  return result;
}

       function flames(n) {
  const value = Number(n) || 0;
  const full = Math.floor(value);
  const half = value % 1 >= 0.5;

  let result = "🔥".repeat(full);

  if (half) {
    result += "<span class='flame-half'>🔥</span>";
  }

  return result;
}

        document.getElementById("app").innerHTML = `
          <section class="header-block">
            <p class="eyebrow">Fiche métier</p>
            <h1>${metier.METIER}</h1>
            <p class="mini">${metier.DESCRIPTION_MINI || ""}</p>

            <div class="illustration-frame">
              <img class="illustration" src="assets/metiers/${metier.IMAGE}" alt="${metier.METIER}">
            </div>
          </section>

          <section class="card section">
            <h2>C’est quoi ce métier ?</h2>
            <p>${metier.DESCRIPTION_METIER}</p>
          </section>

          <section class="card section">
            <h2>Le métier en pratique</h2>

            <div class="metric">
              <h3>Travail</h3>
              ${gauge(metier.INDIVIDUEL, "Individuel", "Collectif")}
              <p>${metier.EXPLICATION_INDIVIDUEL}</p>
            </div>

            <div class="metric">
              <h3>Organisation</h3>
              ${gauge(metier.LIBRE, "Libre", "Structurée")}
              <p>${metier.EXPLICATION_LIBRE}</p>
            </div>

            <div class="metric">
              <h3>Rythme</h3>
              ${gauge(metier.ROUTINIER, "Routinier", "Nouveauté", true)}
              <p>${metier.EXPLICATION_ROUTINIER}</p>
            </div>

            <div class="metric">
              <h3>Environnement</h3>
              ${gauge(metier.TERRAIN, "Terrain", "Bureau", true)}
              <p>${metier.EXPLICATION_TERRAIN}</p>
            </div>
          </section>

          <section class="card section">
            <h2>Autres repères</h2>

            <div class="repere">
              <div class="repere-title">🎓 Diplôme</div>
              <div class="repere-value">${metier.DIPLOME}</div>
              <p>${metier.EXPLICATION_DIPLOME}</p>
            </div>

            <div class="repere">
              <div class="repere-title">💰 Salaire</div>
              <div class="repere-value">${euros(metier.SALAIRE)}</div>
              <p>${metier.EXPLICATION_SALAIRE}</p>
            </div>

            <div class="repere">
              <div class="repere-title">📈 Demande</div>
              <div class="repere-value">${flames(metier.DEMANDE)}</div>
              <p>${metier.EXPLICATION_DEMANDE}</p>
            </div>

            <div class="repere">
              <div class="repere-title">⚙️ Contraintes / pénibilité</div>
              <div class="repere-value">${metier.PENEBILITE}</div>
              <p>${metier.EXPLICATION_PENEBILITE}</p>
            </div>
          </section>

          <section class="card section">
            <h2>Qualités utiles</h2>
            <div class="skills">
              <span>${metier.QUALITE1}</span>
              <span>${metier.QUALITE2}</span>
              <span>${metier.QUALITE3}</span>
            </div>
          </section>

          <section class="card section">
            <h2>Vidéos</h2>
            <div class="videos">
              ${youtubeEmbed(metier.YOUTUBE1)}
              ${youtubeEmbed(metier.YOUTUBE2)}
            </div>
          </section>
        `;
      })
      .catch(() => {
        document.getElementById("app").innerHTML = `
          <section class="card section">
            <h1>Erreur</h1>
            <p>Impossible de charger les données.</p>
          </section>
        `;
      });
  </script>
</body>
</html>
