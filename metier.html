<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fiche métier</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <main class="page">
    <div class="container" id="app"></div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug");

    fetch("data/metiers.json")
      .then(r => r.json())
      .then(data => {
        const metier = data.find(m => m.SLUG === slug) || data[0];

        function gauge(value, left, right, reverse = false) {
          let pos = Math.max(0, Math.min(10, value)) * 10;
          if (reverse) pos = 100 - pos;

          return `
            <div class="gauge-block">
              <div class="gauge-labels">
                <span>${left}</span>
                <span>${right}</span>
              </div>
              <div class="gauge-bar">
                <div class="gauge-fill"></div>
                <div class="gauge-dot" style="left:${pos}%"></div>
              </div>
            </div>
          `;
        }

        document.getElementById("app").innerHTML = `
          
          <section class="header">
            <h1>${metier.METIER}</h1>
            <p class="mini">${metier.DESCRIPTION_MINI}</p>

            <div class="illustration">
              <img src="assets/metiers/${metier.IMAGE}" />
            </div>
          </section>

          <section class="card">
            <p>${metier.DESCRIPTION_METIER}</p>
          </section>

          <section class="card">
            <h2>Le métier en pratique</h2>

            ${gauge(metier.INDIVIDUEL, "Individuel", "Collectif")}
            <p>${metier.EXPLICATION_INDIVIDUEL}</p>

            ${gauge(metier.LIBRE, "Libre", "Structuré")}
            <p>${metier.EXPLICATION_LIBRE}</p>

            ${gauge(metier.ROUTINIER, "Routinier", "Nouveauté", true)}
            <p>${metier.EXPLICATION_ROUTINIER}</p>

            ${gauge(metier.TERRAIN, "Terrain", "Bureau", true)}
            <p>${metier.EXPLICATION_TERRAIN}</p>
          </section>

          <section class="card">
            <h2>Repères</h2>

            <div class="repere">
              <strong>🎓 ${metier.DIPLOME}</strong>
              <p>${metier.EXPLICATION_DIPLOME}</p>
            </div>

            <div class="repere">
              <strong>💰 ${"🔥".repeat(metier.SALAIRE)}</strong>
              <p>${metier.EXPLICATION_SALAIRE}</p>
            </div>

            <div class="repere">
              <strong>📈 ${metier.DEMANDE}/5</strong>
              <p>${metier.EXPLICATION_DEMANDE}</p>
            </div>

            <div class="repere">
              <strong>⚙️ ${metier.PENEBILITE}</strong>
              <p>${metier.EXPLICATION_PENEBILITE}</p>
            </div>
          </section>

          <section class="card">
            <h2>Qualités utiles</h2>
            <div class="skills">
              <span>${metier.QUALITE1}</span>
              <span>${metier.QUALITE2}</span>
              <span>${metier.QUALITE3}</span>
            </div>
          </section>

          <section class="card">
            <h2>Vidéos</h2>
            ${metier.YOUTUBE1 ? `<iframe src="https://www.youtube.com/embed/${metier.YOUTUBE1.split("v=")[1]}"></iframe>` : ""}
            ${metier.YOUTUBE2 ? `<iframe src="https://www.youtube.com/embed/${metier.YOUTUBE2.split("v=")[1]}"></iframe>` : ""}
          </section>
        `;
      });
  </script>
</body>
</html>
